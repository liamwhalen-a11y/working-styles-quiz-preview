function b64buf(b){var bin=atob(b);var u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
async function unlock(pw){
  var enc=new TextEncoder();
  var norm=pw.normalize('NFKC');
  var baseKey=await crypto.subtle.importKey('raw',enc.encode(norm),'PBKDF2',false,['deriveKey']);
  var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64buf(PAY.s),iterations:PAY.it,hash:'SHA-256'},baseKey,{name:'AES-GCM',length:256},false,['decrypt']);
  var ptBuf=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64buf(PAY.iv)},key,b64buf(PAY.ct));
  var html=new TextDecoder().decode(ptBuf);
  document.open();document.write(html);document.close();
}
document.getElementById('gForm').addEventListener('submit',function(e){
  e.preventDefault();
  var err=document.getElementById('gErr');err.textContent='';
  unlock(document.getElementById('gPw').value).catch(function(){err.textContent='Incorrect passphrase. Try again.';});
});
